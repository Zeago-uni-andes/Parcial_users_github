<div class="container py-4">
  <div class="row">
    <div class="col-md-5">
      <header class="mb-5">
        <h1 class="fw-bold display-5 mb-2" style="font-family: 'Manrope', sans-serif;">Lista de usuarios </h1>
        <p class="text-muted small">Conoce y conecta con nuestros contribuidores de las plataformas.</p>
      </header>

      <div class="d-grid gap-4">
        <div *ngFor="let u of users" 
             (click)="onSelect(u)" 
             class="card border-0 overflow-hidden shadow-sm selection-card" 
             style="cursor: pointer; border-radius: 20px; transition: transform 0.2s;">
          
          <div class="position-relative bg-dark" style="height: 400px;">
            <img [src]="u.avatarUrl" class="w-100 h-100 object-fit-cover opacity-75" [alt]="u.name">
            
            <div class="position-absolute bottom-0 start-0 w-100 p-4" 
                 style="background: linear-gradient(transparent, rgba(0,0,0,0.9));">
              
              <div class="d-flex align-items-center mb-1">
                <span class="rounded-circle me-2" 
                      [style.background-color]="u.role === 'admin' ? '#0056ff' : '#64748b'" 
                      style="width: 8px; height: 8px;"></span>
                <small class="text-white text-uppercase fw-bold letter-spacing-1" style="font-size: 0.7rem;">
                  {{ u.role }}
                </small>
              </div>

              <h3 class="text-white fw-bold mb-0">{{ u.name }}</h3>
              <small class="text-white-50">@{{ u.username }}</small>
            </div>
          </div>
        </div>
      </div>
    </div>
</div>
