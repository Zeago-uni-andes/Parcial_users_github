<div class="container-fluid py-4 animate-fade-in" *ngIf="repoDetail">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0" style="font-family: 'Manrope'; font-size: 1.2rem;">
        <li class="breadcrumb-item"><a routerLink="/repos" class="text-decoration-none text-muted">developer-hub</a></li>
        <li class="breadcrumb-item active fw-bold text-dark" aria-current="page">{{ repoDetail.name }}</li>
        <span class="badge rounded-pill bg-info bg-opacity-10 text-info border border-info border-opacity-25 ms-2 small">Public</span>
      </ol>
    </nav>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary btn-sm rounded-3 px-3"><i class="bi bi-star me-2"></i>Star <span class="fw-bold">{{ repoDetail.stars }}</span></button>
    </div>
  </div>

  <p class="text-muted mb-5">{{ repoDetail.description }}</p>

  <div class="row g-3 mb-5">
    <div class="col-md-3">
      <div class="card border-0 shadow-sm rounded-4 p-3 d-flex flex-row align-items-center gap-3">
        <div class="bg-primary bg-opacity-10 p-2 rounded-3 text-primary"><i class="bi bi-code-slash fs-4"></i></div>
        <div><small class="text-muted d-block">Language</small><span class="fw-bold">{{ repoDetail.language }}</span></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card border-0 shadow-sm rounded-4 p-3 d-flex flex-row align-items-center gap-3">
        <div class="bg-warning bg-opacity-10 p-2 rounded-3 text-warning"><i class="bi bi-star-fill fs-4"></i></div>
        <div><small class="text-muted d-block">Stars</small><span class="fw-bold">{{ repoDetail.stars }}</span></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card border-0 shadow-sm rounded-4 p-3 d-flex flex-row align-items-center gap-3">
        <div class="bg-success bg-opacity-10 p-2 rounded-3 text-success"><i class="bi bi-calendar-event fs-4"></i></div>
        <div><small class="text-muted d-block">Created</small><span class="fw-bold">{{ repoDetail.createdAt }}</span></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card border-0 shadow-sm rounded-4 p-3 d-flex flex-row align-items-center gap-3">
        <div class="bg-dark bg-opacity-10 p-2 rounded-3 text-dark"><i class="bi bi-person-badge fs-4"></i></div>
        <div><small class="text-muted d-block">Owner ID</small><span class="fw-bold">#{{ repoDetail.ownerId }}</span></div>
      </div>
    </div>
  </div>

</div>

<div *ngIf="!repoDetail" class="text-center py-5">
  <div class="spinner-border text-primary" role="status"></div>
  <p class="mt-3 text-muted">Sincronizando con el servidor de GitHub...</p>
</div>
