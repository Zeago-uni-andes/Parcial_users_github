<div class="container py-4 animate-fade-in">
  
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 gap-3">
    <div>
      <h1 class="fw-bold display-6 mb-1" style="font-family: 'Manrope', sans-serif;">Repositories</h1>
      <p class="text-muted small mb-0">Manage and explore your code collections.</p>
    </div>
  </div>

  <div class="row g-4">
    

    <div *ngFor="let repo of repository" class="col-md-6 col-lg-4">
      <div class="card h-100 border-0 shadow-sm rounded-4 p-4 selection-card position-relative overflow-hidden" 
           style="transition: all 0.3s ease; cursor: pointer;"
           [routerLink]="['/repos', repo.id]">
        
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="bg-light rounded-3 p-2 text-primary">
            <i class="bi bi-folder2-open fs-4"></i>
          </div>
          <div class="small fw-bold text-muted d-flex align-items-center">
            <i class="bi bi-star-fill text-warning me-1"></i> {{ repo.stars }}
          </div>
        </div>

        <h4 class="fw-bold text-dark mb-2" style="font-family: 'Manrope', sans-serif;">{{ repo.name }}</h4>
        <p class="text-muted small mb-4 line-clamp-2">
          {{ repo.description }}
        </p>

        <div class="mt-auto d-flex justify-content-between align-items-center border-top pt-3">
          <div class="d-flex align-items-center">
            <span class="rounded-circle me-2" 
                  [style.background-color]="repo.language === 'TypeScript' ? '#0056ff' : '#f1c40f'" 
                  style="width: 10px; height: 10px;"></span>
            <small class="fw-semibold text-secondary">{{ repo.language }}</small>
          </div>
          <small class="text-muted" style="font-size: 0.75rem;">
            Updated {{ repo.createdAt }}
          </small>
        </div>
      </div>
    </div>
  </div>
</div>
